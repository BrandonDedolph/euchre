# GoReleaser config — builds cross-platform binaries and attaches them to a
# GitHub Release when a version tag (vX.Y.Z) is pushed.
# Test locally with:  goreleaser release --snapshot --clean
version: 2

project_name: euchre

before:
  hooks:
    - go mod tidy

builds:
  - id: euchre
    main: ./cmd/euchre
    binary: euchre
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: euchre
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
